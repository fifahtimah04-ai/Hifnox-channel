<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hifnox - Video Terbaru</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0f0f; 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
        }
        .video-box { 
            position: relative; 
            padding-bottom: 177.78%; /* Rasio 9:16 untuk YouTube Shorts */
            height: 0; 
            overflow: hidden; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            background: #000;
        }
        .video-box iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
        }
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #ff0000; }
        .btn-sub { 
            display: inline-block; 
            background: #ff0000; 
            color: white; 
            padding: 15px 40px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 16px; 
            transition: transform 0.3s;
        }
        .btn-sub:hover { 
            transform: scale(1.05);
            background: #cc0000;
        }
        p { font-size: 0.9rem; color: #aaaaaa; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Tonton Video Shorts Terbaru!</h2>
        
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/rnTEqCO7HdU?autoplay=1&mute=1&loop=1&playlist=rnTEqCO7HdU" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>

        <a href="https://youtube.com/@hifnox?sub_confirmation=1" class="btn-sub">SUBSCRIBE HIFNOX</a>
        <p>Terima kasih sudah menonton! Jangan lupa share link ini.</p>
    </div>

</body>
</html>
